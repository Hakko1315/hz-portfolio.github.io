<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<!-- On retire user-scalable=no pour autoriser le zoom pinch sur mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visualisation — Hakim Zoghlami</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #1a1a1a;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: rgba(10,10,10,0.98);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
  z-index: 10;
}

.topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; }

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 100px;
  padding: 7px 14px;
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  font-size: 0.78rem;
  font-weight: 500;
  white-space: nowrap;
  transition: background 0.2s;
  cursor: pointer;
  flex-shrink: 0;
}
.back-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }

.doc-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  color: rgba(255,255,255,0.4);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.confidential-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,80,80,0.1);
  border: 1px solid rgba(255,80,80,0.25);
  border-radius: 100px;
  padding: 5px 12px;
  font-size: 0.68rem;
  font-weight: 500;
  color: rgba(255,120,120,0.9);
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 0.95rem;
  letter-spacing: 2px;
  color: #0071e3;
}

.pagebar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 16px;
  background: rgba(10,10,10,0.85);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.3);
  gap: 10px;
}

/* Petit hint mobile */
.mobile-hint {
  display: none;
  font-size: 0.65rem;
  color: rgba(255,255,255,0.2);
}

@media (max-width: 768px) {
  .mobile-hint { display: inline; }
}

/* ── ZONE DE SCROLL ── */
.pdf-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: auto; /* scroll horizontal aussi pour zoomer */
  background: #2a2a2a;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
  gap: 20px;
  -webkit-overflow-scrolling: touch;
}

/* ── CHAQUE PAGE ── */
.page-wrap {
  position: relative;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
  /* Sur mobile : largeur fixe plus grande pour lisibilité */
  width: 100%;
  max-width: 900px;
}

.page-wrap canvas {
  display: block;
  width: 100%;
  height: auto;
}

/* Filigranes */
.wm-container {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  padding: 8% 0;
}

.wm-text {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(1.4rem, 5vw, 2.6rem);
  color: rgba(0, 113, 227, 0.18);
  letter-spacing: 6px;
  text-transform: uppercase;
  white-space: nowrap;
  transform: rotate(-35deg);
}

.loading-msg {
  color: rgba(255,255,255,0.35);
  font-size: 0.88rem;
  text-align: center;
  padding: 60px 20px;
}

.bottombar {
  flex-shrink: 0;
  text-align: center;
  padding: 8px;
  background: rgba(10,10,10,0.98);
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 0.68rem;
  color: rgba(255,255,255,0.18);
  letter-spacing: 1px;
}

@media (max-width: 600px) {
  .topbar { padding: 10px 12px; }
  .doc-title { display: none; }
  .confidential-badge { display: none; }
  .pdf-scroll { padding: 12px 8px; gap: 12px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" onclick="history.back()">← Retour</a>
    <span class="doc-title" id="doc-title">Document</span>
  </div>
  <div class="topbar-right">
    <span class="confidential-badge">🔒 Confidentiel</span>
    <span class="logo">HZ</span>
  </div>
</div>

<div class="pagebar">
  <span id="page-info">Chargement…</span>
  <span class="mobile-hint">· Pince pour zoomer</span>
</div>

<div class="pdf-scroll" id="pdf-scroll">
  <div class="loading-msg" id="loading-msg">⏳ Chargement du document…</div>
</div>

<div class="bottombar">
  © Hakim Zoghlami &nbsp;·&nbsp; Document confidentiel &nbsp;·&nbsp; Reproduction interdite
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const params = new URLSearchParams(window.location.search);
  const file   = params.get('file')  || '';
  const title  = params.get('title') || 'Document';
  document.getElementById('doc-title').textContent = title;

  /* ── Résolution :
     On multiplie par devicePixelRatio pour que sur les écrans Retina/OLED
     le canvas soit rendu en haute résolution (2x ou 3x sur iPhone) ── */
  function getScale() {
    const dpr       = window.devicePixelRatio || 1;
    const container = document.getElementById('pdf-scroll');
    /* Sur mobile on rend à 800px minimum pour avoir assez de pixels */
    const available = Math.max(container.clientWidth - 32, 800);
    const base      = Math.min(available, 900) / 595;
    return base * dpr; /* échelle haute résolution */
  }

  function createWatermarks() {
    const container = document.createElement('div');
    container.className = 'wm-container';
    for (let i = 0; i < 3; i++) {
      const wm = document.createElement('div');
      wm.className = 'wm-text';
      wm.textContent = '© Hakim Zoghlami';
      container.appendChild(wm);
    }
    return container;
  }

  async function renderPageInWrap(pdf, num, scale) {
    const dpr      = window.devicePixelRatio || 1;
    const page     = await pdf.getPage(num);
    const viewport = page.getViewport({ scale });

    const wrap = document.createElement('div');
    wrap.className = 'page-wrap';

    const canvas = document.createElement('canvas');
    /* Le canvas est grand (haute résolution) mais affiché à taille CSS normale */
    canvas.width  = viewport.width;
    canvas.height = viewport.height;
    /* On force la taille CSS à la largeur logique (sans le dpr) */
    canvas.style.width  = (viewport.width / dpr) + 'px';
    canvas.style.height = (viewport.height / dpr) + 'px';

    wrap.appendChild(canvas);
    wrap.appendChild(createWatermarks());

    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;

    return wrap;
  }

  pdfjsLib.getDocument(file).promise.then(async pdf => {
    const total  = pdf.numPages;
    const scale  = getScale();
    const scroll = document.getElementById('pdf-scroll');

    document.getElementById('page-info').textContent =
      `${total} page${total > 1 ? 's' : ''} — Faites défiler pour lire`;

    for (let i = 1; i <= total; i++) {
      const wrap = await renderPageInWrap(pdf, i, scale);
      if (i === 1) document.getElementById('loading-msg').remove();
      scroll.appendChild(wrap);
    }

  }).catch(() => {
    document.getElementById('loading-msg').textContent = '❌ Impossible de charger le document.';
    document.getElementById('page-info').textContent = '';
  });

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const blocked = ['s','p','u','a','c'];
    if ((e.ctrlKey || e.metaKey) && blocked.includes(e.key.toLowerCase())) {
      e.preventDefault(); return false;
    }
    if (e.key === 'F12') { e.preventDefault(); return false; }
    if (e.key === 'PrintScreen') {
      e.preventDefault();
      navigator.clipboard.writeText('').catch(() => {});
      return false;
    }
  });
  document.addEventListener('selectstart', e => e.preventDefault());
  document.addEventListener('dragstart',   e => e.preventDefault());
</script>

</body>
</html>
